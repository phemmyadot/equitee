databases:
  - name: equitee-db
    databaseName: equitee
    user: equitee
    plan: free

services:
  - type: web
    name: equitee-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: equitee-db
          property: connectionString
